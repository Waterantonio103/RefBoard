<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data: blob: file: http: https:; connect-src 'self' data: blob: http: https:;">
    <title>Reference Board</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body tabindex="-1">
    <header class="app-titlebar" aria-label="Application window">
      <div class="app-titlebar-drag">
        <img class="app-titlebar-icon" src="icon.png" alt="" width="22" height="22">
        <span class="app-titlebar-title">Reference Board</span>
        <div class="app-menus">
          <div class="app-menu">
            <button class="app-menu-button" type="button" aria-haspopup="menu" aria-expanded="false">File</button>
            <div class="app-menu-dropdown" role="menu" hidden>
              <button type="button" role="menuitem" data-menu-action="add-images">Add Images...</button>
              <button type="button" role="menuitem" data-menu-action="image-search">Image Search...</button>
              <button type="button" role="menuitem" data-menu-action="new-frame">New Frame</button>
              <div class="app-menu-separator" role="separator"></div>
              <button type="button" role="menuitem" data-menu-action="save-board">Save Board</button>
              <button type="button" role="menuitem" data-menu-action="open-board">Open Board...</button>
              <button type="button" role="menuitem" data-menu-action="import-board">Import Board...</button>
              <div class="app-menu-separator" role="separator"></div>
              <button type="button" role="menuitem" data-menu-action="export-board">Export .refboard...</button>
              <button type="button" role="menuitem" data-menu-action="export-png">Export PNG...</button>
              <div class="app-menu-separator" role="separator"></div>
              <label class="app-menu-check" role="menuitemcheckbox">
                <input id="fileAutoSaveInput" type="checkbox">
                <span>Auto Save</span>
              </label>
            </div>
          </div>
          <div class="app-menu">
            <button class="app-menu-button" type="button" aria-haspopup="menu" aria-expanded="false">Edit</button>
            <div class="app-menu-dropdown" role="menu" hidden>
              <button type="button" role="menuitem" data-menu-action="undo">Undo</button>
              <button type="button" role="menuitem" data-native-action="redo">Redo</button>
              <div class="app-menu-separator" role="separator"></div>
              <button type="button" role="menuitem" data-native-action="cut">Cut</button>
              <button type="button" role="menuitem" data-native-action="copy">Copy</button>
              <button type="button" role="menuitem" data-native-action="paste">Paste</button>
              <button type="button" role="menuitem" data-menu-action="select-all">Select All</button>
              <div class="app-menu-separator" role="separator"></div>
              <button type="button" role="menuitem" data-menu-action="delete-selected">Delete Selected</button>
              <button type="button" role="menuitem" data-menu-action="rename-selected">Rename Selected</button>
            </div>
          </div>
          <div class="app-menu">
            <button class="app-menu-button" type="button" aria-haspopup="menu" aria-expanded="false">View</button>
            <div class="app-menu-dropdown" role="menu" hidden>
              <button type="button" role="menuitem" data-menu-action="reset-zoom">Reset Zoom</button>
              <button type="button" role="menuitem" data-menu-action="zoom-in">Zoom In</button>
              <button type="button" role="menuitem" data-menu-action="zoom-out">Zoom Out</button>
              <div class="app-menu-separator" role="separator"></div>
              <button type="button" role="menuitem" data-native-action="toggle-fullscreen">Toggle Full Screen</button>
            </div>
          </div>
          <div class="app-menu">
            <button class="app-menu-button" type="button" aria-haspopup="menu" aria-expanded="false">Window</button>
            <div class="app-menu-dropdown" role="menu" hidden>
              <button type="button" role="menuitem" data-native-action="minimize">Minimize</button>
              <button type="button" role="menuitem" data-native-action="maximize">Maximize</button>
              <button type="button" role="menuitem" data-native-action="close">Close</button>
            </div>
          </div>
        </div>
      </div>
      <div class="window-controls" aria-label="Window controls">
        <button id="windowMinimizeBtn" class="window-control" type="button" title="Minimize" aria-label="Minimize">
          <svg viewBox="0 0 12 12" aria-hidden="true">
            <path d="M2 6h8"></path>
          </svg>
        </button>
        <button id="windowMaximizeBtn" class="window-control" type="button" title="Maximize" aria-label="Maximize">
          <svg viewBox="0 0 12 12" aria-hidden="true">
            <path d="M3 3h6v6H3z"></path>
          </svg>
        </button>
        <button id="windowCloseBtn" class="window-control window-control-close" type="button" title="Close" aria-label="Close">
          <svg viewBox="0 0 12 12" aria-hidden="true">
            <path d="M3 3l6 6"></path>
            <path d="M9 3L3 9"></path>
          </svg>
        </button>
      </div>
    </header>
    <aside class="sidebar" aria-label="Reference Board tools">
      <button id="addImageBtn" class="icon-button" type="button" title="Add images from disk" aria-label="Add images from disk">
        <span class="icon-button-label" aria-hidden="true">Add images from disk</span>
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M4 5h16v14H4z"></path>
          <path d="m4 16 5-5 4 4 2-2 5 5"></path>
          <path d="M15.5 8.5h.01"></path>
        </svg>
      </button>
      <button id="imageSearchBtn" class="icon-button" type="button" title="Search images online" aria-label="Search images online">
        <span class="icon-button-label" aria-hidden="true">Search images online</span>
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M10.5 18a7.5 7.5 0 1 1 5.3-12.8 7.5 7.5 0 0 1-5.3 12.8z"></path>
          <path d="m16 16 5 5"></path>
          <path d="M7.5 10.5h6"></path>
          <path d="M10.5 7.5v6"></path>
        </svg>
      </button>
      <button id="addFrameBtn" class="icon-button" type="button" title="Create frame" aria-label="Create frame">
        <span class="icon-button-label" aria-hidden="true">Create frame</span>
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M5 5h14v14H5z"></path>
          <path d="M12 8v8"></path>
          <path d="M8 12h8"></path>
        </svg>
      </button>
      <button id="saveBtn" class="icon-button" type="button" title="Save board" aria-label="Save board">
        <span class="icon-button-label" aria-hidden="true">Save board</span>
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
          <path d="M17 21v-8H7v8"></path>
          <path d="M7 3v5h8"></path>
        </svg>
      </button>
      <button id="openBtn" class="icon-button" type="button" title="Open board" aria-label="Open board">
        <span class="icon-button-label" aria-hidden="true">Open board</span>
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M3 7h6l2 2h10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
          <path d="M3 7V5a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v2"></path>
        </svg>
      </button>
      <button id="importBtn" class="icon-button" type="button" title="Import .refboard or JSON" aria-label="Import .refboard or JSON">
        <span class="icon-button-label" aria-hidden="true">Import board</span>
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
          <path d="M14 2v6h6"></path>
          <path d="M12 18v-6"></path>
          <path d="m9 15 3 3 3-3"></path>
        </svg>
      </button>
      <button id="exportBoardBtn" class="icon-button" type="button" title="Export .refboard" aria-label="Export .refboard">
        <span class="icon-button-label" aria-hidden="true">Export board</span>
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
          <path d="M14 2v6h6"></path>
          <path d="M12 12v6"></path>
          <path d="m9 15 3-3 3 3"></path>
        </svg>
      </button>
      <button id="savePngBtn" class="icon-button" type="button" title="Export PNG" aria-label="Export PNG">
        <span class="icon-button-label" aria-hidden="true">Export PNG</span>
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
          <path d="M7 10l5 5 5-5"></path>
          <path d="M12 15V3"></path>
        </svg>
      </button>
      <button id="themeBtn" class="icon-button" type="button" title="Switch theme" aria-label="Switch theme">
        <span class="icon-button-label" aria-hidden="true">Switch theme</span>
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 3a6 6 0 0 0 9 7.5A9 9 0 1 1 12 3z"></path>
        </svg>
      </button>
      <input id="imageInput" type="file" accept="image/*" multiple hidden>
      <input id="boardInput" type="file" accept="application/json,.json,.refboard" hidden>
    </aside>
    <header class="board-bar" aria-label="Board">
      <button id="boardTitleBtn" class="board-title" type="button" title="Double-click to rename">Board.001</button>
      <span id="saveState" class="save-state" role="status" aria-live="polite">unsaved</span>
    </header>
    <span id="status" role="status"></span>
    <div id="contextMenu" class="context-menu" role="menu" hidden>
      <button type="button" role="menuitem" data-action="add-image">Add image</button>
      <button type="button" role="menuitem" data-action="image-search">Image search</button>
      <button type="button" role="menuitem" data-action="paste-image">Paste image</button>
      <button type="button" role="menuitem" data-action="add-frame">Add frame</button>
      <button type="button" role="menuitem" data-action="rename">Rename selected</button>
      <button type="button" role="menuitem" data-action="delete">Delete selected</button>
      <button type="button" role="menuitem" data-action="save">Save board</button>
      <button type="button" role="menuitem" data-action="export-board">Export .refboard</button>
      <button type="button" role="menuitem" data-action="save-png">Export PNG</button>
    </div>
    <dialog id="openDialog" class="board-dialog">
      <form method="dialog" class="dialog-panel">
        <header class="dialog-header">
          <h2>Open Board</h2>
          <button id="closeOpenDialogBtn" class="text-button" value="cancel" type="submit">Close</button>
        </header>
        <div id="boardList" class="board-list"></div>
      </form>
    </dialog>
    <dialog id="imageSearchDialog" class="board-dialog image-search-dialog">
      <div class="dialog-panel image-search-panel">
        <header class="dialog-header">
          <h2>Image Search</h2>
          <button id="closeImageSearchBtn" class="text-button" type="button">Close</button>
        </header>
        <form id="imageSearchForm" class="image-search-form">
          <input id="imageSearchQuery" type="search" autocomplete="off" spellcheck="false" placeholder="Search Google Images" aria-label="Search Google Images">
          <select id="imageSearchSafe" aria-label="SafeSearch">
            <option value="active">SafeSearch on</option>
            <option value="off">SafeSearch off</option>
          </select>
          <button id="imageSearchSubmit" class="text-button" type="submit">Search</button>
        </form>
        <details id="imageSearchSetup" class="image-search-setup">
          <summary>Local Google Search setup</summary>
          <div class="image-search-credentials">
            <label>
              <span>API key</span>
              <input id="imageSearchApiKey" type="password" autocomplete="off" spellcheck="false">
            </label>
            <label>
              <span>Search engine ID</span>
              <input id="imageSearchEngineId" type="text" autocomplete="off" spellcheck="false">
            </label>
          </div>
        </details>
        <div id="imageSearchRecent" class="image-search-recent" aria-label="Recent searches"></div>
        <div id="imageSearchMessage" class="image-search-message" role="status" aria-live="polite"></div>
        <div class="image-search-body">
          <div id="imageSearchResults" class="image-search-results" aria-label="Image search results"></div>
          <aside id="imageSearchPreview" class="image-search-preview" aria-label="Selected image"></aside>
        </div>
        <footer class="image-search-footer">
          <button id="imageSearchMoreBtn" class="text-button" type="button" hidden>More</button>
        </footer>
      </div>
    </dialog>
    <form id="boardRenameEditor" class="board-rename" hidden>
      <input id="boardRenameInput" type="text" autocomplete="off" spellcheck="false" aria-label="Rename board">
    </form>
    <form id="renameEditor" class="rename-editor" hidden>
      <input id="renameInput" type="text" autocomplete="off" spellcheck="false" aria-label="Rename selected item">
    </form>
    <main id="canvasWrap">
      <div id="stage"></div>
    </main>
    <script src="vendor/konva.min.js"></script>
    <script src="storage.js"></script>
    <script src="app.js"></script>
  </body>
</html>
